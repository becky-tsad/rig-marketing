<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Abstract leaf/botanical -->
  <g transform="translate(400, 180)" opacity="0.15">
    <ellipse cx="0" cy="-20" rx="35" ry="55" fill="white" transform="rotate(-30)"/>
    <ellipse cx="15" cy="-10" rx="30" ry="50" fill="white" transform="rotate(20)"/>
    <line x1="0" y1="30" x2="0" y2="-40" stroke="white" stroke-width="4"/>
  </g>
  <text x="400" y="280" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="white">Bloom Botanicals</text>
  <text x="400" y="315" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" fill="rgba(255,255,255,0.7)">Complete Brand Transformation</text>
  <rect x="350" y="340" width="100" height="3" rx="1.5" fill="white" opacity="0.4"/>
</svg>