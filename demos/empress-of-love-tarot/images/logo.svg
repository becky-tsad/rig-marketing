<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 45">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8c170"/>
      <stop offset="100%" style="stop-color:#d4a84a"/>
    </linearGradient>
  </defs>

  <!-- Crescent moon -->
  <circle cx="18" cy="22" r="14" fill="#e8c170"/>
  <circle cx="24" cy="18" r="11" fill="#1a2d3d"/>

  <!-- Stars -->
  <circle cx="8" cy="10" r="2" fill="#e8c170"/>
  <circle cx="32" cy="8" r="1.5" fill="#e8c170"/>
  <circle cx="6" cy="32" r="1.5" fill="#e8c170"/>

  <!-- Text: The Empress of Love - single line -->
  <text x="48" y="29" font-family="Georgia, serif" font-size="20" fill="#ffffff" letter-spacing="0.5">The </text>
  <text x="85" y="29" font-family="Georgia, serif" font-size="24" font-style="italic" fill="#e8c170" letter-spacing="1">Empress</text>
  <text x="185" y="29" font-family="Georgia, serif" font-size="20" fill="#ffffff" letter-spacing="0.5"> of </text>
  <text x="215" y="29" font-family="Georgia, serif" font-size="24" font-style="italic" fill="#e8c170" letter-spacing="1">Love</text>

