<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 50">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8c170"/>
      <stop offset="100%" style="stop-color:#d4a84a"/>
    </linearGradient>
  </defs>

  <!-- Left decorative element - crescent moon -->
  <g transform="translate(0, 25)">
    <path d="M12 -12 A12 12 0 1 1 12 12 A8 8 0 1 0 12 -12" fill="url(#goldGrad)"/>
    <circle cx="6" cy="-8" r="1.5" fill="url(#goldGrad)"/>
    <circle cx="2" cy="0" r="1" fill="url(#goldGrad)"/>
    <circle cx="6" cy="8" r="1.5" fill="url(#goldGrad)"/>
  </g>

  <!-- Text: The Empress -->
  <text x="32" y="23" font-family="Georgia, serif" font-size="18" font-weight="400" fill="#ffffff" letter-spacing="1">The</text>
  <text x="60" y="23" font-family="Georgia, serif" font-size="22" font-weight="400" fill="#e8c170" letter-spacing="1.5">Empress</text>

  <!-- Text: of Love -->
  <text x="32" y="42" font-family="Georgia, serif" font-size="14" font-weight="400" fill="#ffffff" letter-spacing="3">of</text>
  <text x="55" y="42" font-family="Georgia, serif" font-size="18" font-weight="400" fill="#e8c170" letter-spacing="2">Love</text>

  <!-- Right decorative element - star -->
  <g transform="translate(130, 32)">
    <path d="M0 -6 L1.5 -1.5 L6 0 L1.5 1.5 L0 6 L-1.5 1.5 L-6 0 L-1.5 -1.5 Z" fill="url(#goldGrad)"/>
  </g>
</svg>
